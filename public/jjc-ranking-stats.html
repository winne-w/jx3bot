<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>竞技场心法排名统计</title>
    <style>
        :root {
            --bg: #f7fafd;
            --bg-accent: #e8f2ff;
            --ink: #2c3e50;
            --muted: #65748b;
            --card: #ffffff;
            --stroke: rgba(137, 196, 244, 0.22);
            --accent: #5b7cfa;
            --accent-2: #ff78b1;
            --shadow: 0 12px 32px rgba(94, 125, 245, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            color: var(--ink);
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            background:
                radial-gradient(circle at 15% 10%, rgba(137, 196, 244, 0.18), transparent 55%),
                radial-gradient(circle at 85% 0%, rgba(255, 121, 176, 0.18), transparent 60%),
                linear-gradient(140deg, var(--bg), #ffffff);
            min-height: 100vh;
            padding: 36px 24px 60px;
        }

        .page {
            width: 100%;
            max-width: none;
            margin: 0 auto;
            position: relative;
        }

        .page::before {
            content: "";
            position: absolute;
            inset: -20px;
            background: repeating-linear-gradient(
                130deg,
                rgba(255, 255, 255, 0.55),
                rgba(255, 255, 255, 0.55) 1px,
                transparent 1px,
                transparent 18px
            );
            border-radius: 32px;
            z-index: -1;
        }

        header {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 24px 28px;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: var(--shadow);
            border: 1px solid rgba(137, 196, 244, 0.22);
        }

        .title {
            font-size: clamp(1.6rem, 2.6vw, 2.4rem);
            letter-spacing: 4px;
            font-weight: 700;
        }

        .subtitle {
            color: var(--muted);
            font-size: 0.98rem;
            display: flex;
            flex-wrap: wrap;
            gap: 10px 18px;
        }

        .announcement {
            border-radius: 14px;
            padding: 10px 14px;
            background: rgba(91, 124, 250, 0.08);
            border: 1px solid rgba(91, 124, 250, 0.22);
            color: #324a7d;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
        }

        .meta {
            display: grid;
            gap: 10px;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        }

        .meta-card {
            border-radius: 16px;
            padding: 12px 14px;
            background: var(--card);
            border: 1px solid var(--stroke);
            font-size: 0.92rem;
            color: var(--muted);
        }

        .meta-card strong {
            display: block;
            color: var(--ink);
            font-size: 1.04rem;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }

        .status {
            margin-top: 18px;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 0.95rem;
            background: rgba(255, 255, 255, 0.9);
            border: 1px dashed rgba(94, 125, 245, 0.25);
            color: var(--muted);
        }

        .status.hidden {
            display: none;
        }

        .tabs {
            margin-top: 18px;
            display: inline-flex;
            gap: 10px;
            padding: 6px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(137, 196, 244, 0.22);
            box-shadow: var(--shadow);
            flex-wrap: wrap;
        }

        .tab-group {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .tab-btn {
            border: none;
            padding: 6px 16px;
            border-radius: 999px;
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            color: var(--muted);
            background: transparent;
            transition: all 0.2s ease;
        }

        .tab-btn.active {
            color: #ffffff;
            background: linear-gradient(120deg, var(--accent), var(--accent-2));
            box-shadow: 0 8px 20px rgba(91, 124, 250, 0.25);
        }

        .tab-export-btn {
            border: none;
            padding: 0;
            font-size: 0.76rem;
            font-weight: 600;
            color: var(--accent);
            background: transparent;
            cursor: pointer;
            line-height: 1;
            transition: color 0.2s ease, opacity 0.2s ease;
        }

        .tab-export-btn:hover {
            color: var(--accent-2);
        }

        .toggle-wrap {
            margin-top: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(137, 196, 244, 0.22);
            box-shadow: var(--shadow);
            width: fit-content;
        }

        .toggle-wrap.hidden {
            display: none;
        }

        .toggle-wrap label {
            font-size: 0.88rem;
            color: var(--muted);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .toggle-wrap input[type="checkbox"] {
            width: 36px;
            height: 20px;
            appearance: none;
            background: rgba(91, 124, 250, 0.2);
            border-radius: 999px;
            position: relative;
            outline: none;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .toggle-wrap input[type="checkbox"]::after {
            content: "";
            position: absolute;
            top: 2px;
            left: 2px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #ffffff;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
            transition: transform 0.2s ease;
        }

        .toggle-wrap input[type="checkbox"]:checked {
            background: linear-gradient(120deg, var(--accent), var(--accent-2));
        }

        .toggle-wrap input[type="checkbox"]:checked::after {
            transform: translateX(16px);
        }

        .grid {
            margin-top: 28px;
            display: grid;
            gap: 24px;
            grid-template-columns: repeat(1, minmax(0, 1fr));
        }

        .range-card {
            min-width: 0;
            background: var(--card);
            border-radius: 20px;
            padding: 18px 18px 22px;
            border: 1px solid var(--stroke);
            box-shadow: 0 10px 28px rgba(94, 125, 245, 0.12);
        }

        .range-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            gap: 10px;
            flex-wrap: wrap;
        }

        .range-heading {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            gap: 10px;
        }

        .range-title h3 {
            margin: 0;
            font-size: 1.1rem;
            letter-spacing: 2px;
        }

        .range-title span {
            color: var(--muted);
            font-size: 0.85rem;
        }

        .range-meta {
            margin: 6px 0 4px;
            font-size: 0.86rem;
            color: var(--muted);
        }

        .export-btn {
            border: none;
            border-radius: 999px;
            padding: 4px 10px;
            font-size: 0.78rem;
            font-weight: 600;
            cursor: pointer;
            color: var(--accent);
            background: rgba(91, 124, 250, 0.12);
            box-shadow: none;
            transition: transform 0.2s ease, background 0.2s ease;
            margin-left: auto;
        }

        .export-btn svg {
            width: 14px;
            height: 14px;
            display: block;
            fill: currentColor;
        }

        .export-btn:hover {
            transform: translateY(-1px);
            background: rgba(91, 124, 250, 0.18);
        }

        .range-card.is-exporting .export-btn {
            opacity: 0;
            pointer-events: none;
        }

        .range-card.is-exporting .detail-list {
            display: none;
        }

        .page.is-exporting-full .tab-export-btn,
        .page.is-exporting-full .export-btn {
            opacity: 0;
            pointer-events: none;
        }

        .page.is-exporting-full .detail-list {
            display: none;
        }

        .export-meta {
            font-size: 0.86rem;
            color: var(--muted);
            margin-bottom: 6px;
        }

        .lane {
            margin-top: 12px;
        }

        .lane-title {
            font-size: 0.98rem;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 8px;
        }

        .bar-row {
            display: grid;
            grid-template-columns: 96px 1fr 52px 60px;
            align-items: center;
            gap: 10px;
            margin-bottom: 4px;
            font-size: 0.9rem;
        }

        .bar {
            height: 16px;
            border-radius: 999px;
            background: linear-gradient(90deg, rgba(91, 124, 250, 0.14), rgba(255, 120, 177, 0.18));
            position: relative;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, var(--accent), var(--accent-2));
            transition: width 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .bar-value {
            font-weight: 700;
            color: var(--ink);
            text-align: right;
        }

        .bar-percent {
            color: var(--muted);
            text-align: right;
            font-size: 0.84rem;
        }

        .bar-legendary {
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: linear-gradient(90deg, rgba(245, 197, 66, 0.9), rgba(245, 168, 66, 0.9));
            opacity: 0.85;
        }

        .bar-kungfu {
            font-weight: 700;
            letter-spacing: 0.5px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .arrow {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
            border-radius: 999px;
            font-size: 0.75rem;
            color: var(--accent);
            background: rgba(91, 124, 250, 0.12);
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .detail[open] .arrow {
            transform: rotate(90deg);
            background: rgba(255, 120, 177, 0.15);
        }

        .detail {
            padding: 0;
            margin-bottom: 6px;
            transition: color 0.2s ease;
        }

        .detail summary {
            list-style: none;
            cursor: pointer;
        }

        .detail:hover {
            color: var(--ink);
        }

        .detail summary::-webkit-details-marker {
            display: none;
        }

        .detail-list {
            margin-top: 8px;
            padding-top: 4px;
            border-top: 1px solid rgba(137, 196, 244, 0.25);
            display: grid;
            gap: 4px;
            font-size: 0.88rem;
        }

        .detail-item {
            display: grid;
            grid-template-columns: 72px 1fr 70px;
            gap: 8px;
            align-items: center;
            color: var(--muted);
        }

        .detail-item-btn {
            width: 100%;
            border: none;
            background: rgba(91, 124, 250, 0.04);
            border-radius: 12px;
            padding: 10px 12px;
            text-align: left;
            cursor: pointer;
            transition: transform 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
        }

        .detail-item-btn:hover {
            transform: translateY(-1px);
            background: rgba(91, 124, 250, 0.09);
            box-shadow: 0 8px 18px rgba(94, 125, 245, 0.12);
        }

        .detail-name {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .detail-weapon {
            width: 18px;
            height: 18px;
            border-radius: 4px;
            object-fit: cover;
            flex: 0 0 auto;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.12);
        }

        .detail-weapon.is-legendary {
            border: 2px solid #f5c542;
            box-shadow: 0 2px 8px rgba(245, 197, 66, 0.45);
        }

        .detail-kungfu-row {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 4px;
        }

        .detail-kungfu-wrap {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .detail-kungfu-wrap::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translate(-50%, -4px);
            background: rgba(30, 40, 55, 0.92);
            color: #ffffff;
            font-size: 0.78rem;
            padding: 4px 8px;
            border-radius: 8px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s ease, transform 0.15s ease;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.2);
            z-index: 10;
        }

        .detail-kungfu-wrap[data-tooltip=""]::after {
            display: none;
        }

        .detail-kungfu-wrap:hover::after {
            opacity: 1;
            transform: translate(-50%, -10px);
        }

        .detail-kungfu {
            width: 18px;
            height: 18px;
            border-radius: 4px;
            object-fit: cover;
            background: #fff;
            border: 1px solid rgba(0, 0, 0, 0.08);
        }

        .detail-kungfu.is-legendary {
            border: 2px solid #f5c542;
            box-shadow: 0 2px 8px rgba(245, 197, 66, 0.45);
        }

        .detail-rank {
            font-weight: 700;
            color: var(--ink);
        }

        .detail-score {
            text-align: right;
            color: var(--ink);
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(24, 33, 47, 0.56);
            backdrop-filter: blur(6px);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 2000;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal-card {
            width: min(960px, 100%);
            max-height: min(86vh, 920px);
            overflow: auto;
            border-radius: 24px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.97), rgba(244, 249, 255, 0.98));
            border: 1px solid rgba(137, 196, 244, 0.22);
            box-shadow: 0 24px 60px rgba(24, 33, 47, 0.24);
            padding: 22px;
        }

        .modal-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 16px;
        }

        .modal-title {
            margin: 0;
            font-size: 1.18rem;
            letter-spacing: 1px;
        }

        .modal-subtitle {
            margin-top: 6px;
            color: var(--muted);
            font-size: 0.9rem;
        }

        .modal-close {
            border: none;
            background: rgba(91, 124, 250, 0.12);
            color: var(--accent);
            width: 34px;
            height: 34px;
            border-radius: 999px;
            cursor: pointer;
            font-size: 1.1rem;
            line-height: 1;
        }

        .modal-loading,
        .modal-empty {
            padding: 18px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.82);
            border: 1px dashed rgba(94, 125, 245, 0.24);
            color: var(--muted);
        }

        .role-overview {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }

        .role-overview-toolbar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .match-list-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin: 2px 0 10px;
        }

        .match-list-title {
            font-weight: 700;
            color: var(--ink);
            font-size: 0.95rem;
        }

        .match-list-actions {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            flex-wrap: wrap;
            gap: 10px;
        }

        .role-overview-toolbar .cache-label,
        .match-list-toolbar .cache-label {
            color: var(--muted);
            font-size: 0.82rem;
        }

        .role-refresh-btn,
        .match-refresh-btn {
            border: 1px solid rgba(137, 196, 244, 0.35);
            background: rgba(255, 255, 255, 0.92);
            color: var(--ink);
            border-radius: 6px;
            padding: 6px 10px;
            font-size: 0.86rem;
            cursor: pointer;
        }

        .role-refresh-btn:disabled,
        .match-refresh-btn:disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }

        .role-overview-card {
            padding: 14px 16px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(137, 196, 244, 0.22);
        }

        .role-overview-card strong {
            display: block;
            font-size: 1.12rem;
            color: var(--ink);
            margin-bottom: 6px;
        }

        .role-overview-card span {
            color: var(--muted);
            font-size: 0.84rem;
        }

        .match-list-panel {
            display: grid;
            gap: 10px;
        }

        .load-more-wrap {
            display: flex;
            justify-content: center;
            padding: 12px 0 4px;
        }

        .load-more-wrap.hidden {
            display: none;
        }

        .load-more-btn {
            border: none;
            padding: 10px 32px;
            border-radius: 999px;
            font-size: 0.92rem;
            font-weight: 600;
            cursor: pointer;
            color: #ffffff;
            background: linear-gradient(120deg, var(--accent), var(--accent-2));
            box-shadow: 0 8px 20px rgba(91, 124, 250, 0.22);
            transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
        }

        .load-more-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(91, 124, 250, 0.3);
        }

        .load-more-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .load-more-btn.loading {
            opacity: 0.7;
            pointer-events: none;
        }

        .match-row-btn {
            border: none;
            width: 100%;
            text-align: left;
            border-radius: 16px;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(137, 196, 244, 0.22);
            cursor: pointer;
            transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
        }

        .match-row-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 24px rgba(94, 125, 245, 0.12);
            border-color: rgba(91, 124, 250, 0.28);
        }

        .match-row-btn.win {
            border-left: 4px solid #34b56a;
        }

        .match-row-btn.lose {
            border-left: 4px solid #d46a6a;
        }

        .match-row-top,
        .match-row-bottom {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px 14px;
        }

        .match-row-top {
            margin-bottom: 8px;
        }

        .match-tag {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            border-radius: 999px;
            background: rgba(91, 124, 250, 0.1);
            color: var(--accent);
            font-size: 0.8rem;
            font-weight: 700;
        }

        .match-tag.win {
            background: rgba(52, 181, 106, 0.12);
            color: #248651;
        }

        .match-tag.lose {
            background: rgba(212, 106, 106, 0.12);
            color: #a34a4a;
        }

        .match-row-meta {
            color: var(--muted);
            font-size: 0.86rem;
        }

        .detail-summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 12px;
            margin-bottom: 18px;
        }

        .detail-summary-card {
            padding: 14px 16px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.94);
            border: 1px solid rgba(137, 196, 244, 0.22);
        }

        .detail-summary-card strong {
            display: block;
            margin-bottom: 6px;
            font-size: 1.06rem;
        }

        .team-grid {
            display: grid;
            gap: 16px;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        }

        .team-card {
            border-radius: 18px;
            padding: 16px;
            background: rgba(255, 255, 255, 0.94);
            border: 1px solid rgba(137, 196, 244, 0.22);
        }

        .team-card.won {
            border-color: rgba(52, 181, 106, 0.3);
            box-shadow: inset 0 0 0 1px rgba(52, 181, 106, 0.08);
        }

        .team-card h4 {
            margin: 0 0 12px;
            font-size: 1rem;
        }

        .team-title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
        }

        .team-title-row h4 {
            margin: 0;
        }

        .team-kungfu-icons {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .team-kungfu-icon {
            width: 22px;
            height: 22px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(137, 196, 244, 0.22);
            box-shadow: 0 3px 8px rgba(24, 33, 47, 0.08);
            overflow: hidden;
        }

        .team-kungfu-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .team-player-list {
            display: grid;
            gap: 10px;
        }

        .team-player {
            border-radius: 14px;
            padding: 12px;
            background: rgba(91, 124, 250, 0.05);
        }

        .team-player.focus {
            background: rgba(255, 120, 177, 0.09);
            border: 1px solid rgba(255, 120, 177, 0.18);
        }

        .team-player-top,
        .team-player-bottom {
            display: flex;
            flex-wrap: wrap;
            gap: 6px 12px;
            align-items: center;
        }

        .team-player-top {
            margin-bottom: 6px;
        }

        .player-name {
            font-weight: 700;
            color: var(--ink);
        }

        .player-meta {
            color: var(--muted);
            font-size: 0.84rem;
        }

        .player-section {
            margin-top: 10px;
        }

        .player-section-label {
            font-size: 0.8rem;
            color: var(--muted);
            margin-bottom: 6px;
        }

        .icon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(36px, 36px));
            gap: 8px;
        }

        .icon-chip {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            overflow: hidden;

<body>
    <div class="page">
        <header>
            <div class="title">竞技场心法排名统计</div>
            <div class="subtitle" id="subtitle">
                <span class="muted">正在加载实时数据...</span>

        <section class="grid" id="grid"></section>

        </footer>

    <div class="modal-overlay" id="role-modal" aria-hidden="true">
        <div class="modal-card">
            <div class="modal-header">
                <div>
                    <h3 class="modal-title" id="role-modal-title">角色近期战绩</h3>
                    <div class="modal-subtitle" id="role-modal-subtitle"></div>
                </div>
                <button class="modal-close" type="button" data-close-modal="role" aria-label="关闭">×</button>

            <div id="role-modal-body"></div>
        </div>
    </div>

    <div class="modal-overlay" id="match-modal" aria-hidden="true">
        <div class="modal-card">
            <div class="modal-header">
                <div>
                    <h3 class="modal-title" id="match-modal-title">对局详情</h3>
                    <div class="modal-subtitle" id="match-modal-subtitle"></div>
                </div>
                <button class="modal-close" type="button" data-close-modal="match" aria-label="关闭">×</button>

    <div class="modal-overlay" id="announcement-modal" aria-hidden="true">
        <div class="modal-card">
            <div class="modal-header">
                <div>
                    <h3 class="modal-title">公告 / 更新说明</h3>
                </div>
                <button class="modal-close" type="button" data-close-modal="announcement" aria-label="关闭">×</button>
            </div>
            <div id="announcement-modal-body"></div>
            <div class="announcement-modal-footer">
                <a href="https://github.com/winne-w/jx3bot/issues" target="_blank" rel="noopener" class="announcement-feedback-link">反馈 & 交流</a>
                <button class="announcement-dismiss-btn" id="announcement-dismiss-btn">知道了</button>
            </div>
        </div>
    </div>

    <div class="floating-feedback hidden" id="floating-feedback">
        <button class="floating-feedback-close" id="floating-feedback-close" aria-label="关闭">×</button>
        <span class="floating-feedback-text">反馈</span>
    </div>

    <script>
        const BASE_API = "/jx3bot/api/jjc/ranking-stats";
        const DEFAULT_LIST_API = `${BASE_API}?action=list`;
        const DEFAULT_READ_API = `${BASE_API}?action=read`;
        const params = new URLSearchParams(window.location.search);
        const listApiUrl = params.get("list_api") || DEFAULT_LIST_API;
        const readApiBase = params.get("api") || DEFAULT_READ_API;
        const detailsApiBase = params.get("details_api") || `${BASE_API}/details`;
        const roleRecentApiBase = params.get("role_recent_api") || `${BASE_API}/role-recent`;
        const roleIndicatorApiBase = params.get("role_indicator_api") || `${BASE_API}/role-indicator`;
        const matchDetailApiBase = params.get("match_detail_api") || `${BASE_API}/match-detail`;

        const rangeConfigs = [
            { key: "top_1000", label: "前1000" },
            { key: "top_200", label: "前200" },
            { key: "top_100", label: "前100" },
            { key: "top_50", label: "前50" },
        ];

        const subtitle = document.getElementById("subtitle");
        const grid = document.getElementById("grid");
        const statusNode = document.getElementById("status");
        const pageNode = document.querySelector(".page");
        const roleModal = document.getElementById("role-modal");
        const roleModalTitle = document.getElementById("role-modal-title");
        const roleModalSubtitle = document.getElementById("role-modal-subtitle");
        const roleModalBody = document.getElementById("role-modal-body");
        const matchModal = document.getElementById("match-modal");
        const matchModalTitle = document.getElementById("match-modal-title");
        const matchModalSubtitle = document.getElementById("match-modal-subtitle");
        const matchModalBody = document.getElementById("match-modal-body");

        let currentStats = null;
        let currentStatsTimestamp = "";
        let currentMode = "all";
        let showLegendaryOverlay = false;
        let currentRoleInspect = null;
        const detailCache = new Map();
        const roleRecentCache = new Map();
        const roleIndicatorCache = new Map();
        const matchDetailCache = new Map();

        let currentPagination = {
            hasMore: false,
            nextCursor: null,
            server: "",
            name: "",
            identityHints: {},
            isLoading: false,
        };

        // ---- Announcement State ----
        const ANNOUNCEMENT_API = "/jx3bot/api/announcements";
        const ANNOUNCEMENT_SEEN_KEY = "announcement_seen_at";
        let announcementCursor = null;
        let announcementHasMore = true;
        let announcementLoading = false;
        let announcementObserver = null;
        let currentPopupSeenAt = null;

        const announcementModal = document.getElementById("announcement-modal");
        const announcementBody = document.getElementById("announcement-modal-body");
        const announcementDismissBtn = document.getElementById("announcement-dismiss-btn");

        function safeGetAnnouncementSeen() {
            try { return localStorage.getItem(ANNOUNCEMENT_SEEN_KEY); } catch (e) { return null; }
        }
        function safeSetAnnouncementSeen(value) {
            try { localStorage.setItem(ANNOUNCEMENT_SEEN_KEY, value); } catch (e) { /* ignore */ }
        }

        const LEGENDARY_WEAPON_NAMES = new Set([
            "钗蝶语双", "七月嘉树", "万象金声", "幽微夜", "蜕骨", "伏魔悲音", "意真",
            "长安", "掠炎", "金乌回首", "栖贤韵", "瀚海引", "镇恶", "仙灵", "暴龙震江",
            "烛微刀", "碧血豪侠", "伏龙阳焰", "天下宏愿", "龙鲤", "银羽雪辉", "子不语",
            "碧岚幽炎", "逾潮声", "静雨", "折枝花满", "昭佛光", "烬灭",
        ]);

        function isLegendaryWeapon(item) {
            if (!item || String(item.weapon_quality) !== "5") {
                return false;
            }
            const weaponName = item.weapon_name || item.weapon?.name || "";
            if (weaponName !== "") {
                return LEGENDARY_WEAPON_NAMES.has(weaponName);
            }
            return false;
        }

        const listContainer = document.createElement("div");
        listContainer.className = "status";
        listContainer.id = "list-status";
        listContainer.innerHTML = `
            <label class="muted" for="date-select">可用日期：</label>
            <select id="date-select" disabled></select>
        `;
        statusNode.insertAdjacentElement("afterend", listContainer);
        const dateSelect = listContainer.querySelector("#date-select");

        const tabContainer = document.createElement("div");
        tabContainer.className = "tabs";
        tabContainer.innerHTML = `
            <div class="tab-group">
                <button class="tab-btn active" data-mode="all" type="button">全部排名</button>
                <button class="tab-export-btn" data-export-mode="all" type="button">导出</button>
            </div>
            <div class="tab-group">
                <button class="tab-btn" data-mode="purple" type="button">紫武排名</button>
                <button class="tab-export-btn" data-export-mode="purple" type="button">导出</button>
            </div>
        `;
        listContainer.insertAdjacentElement("afterend", tabContainer);

        const toggleContainer = document.createElement("div");
        toggleContainer.className = "toggle-wrap";
        toggleContainer.innerHTML = `
            <label>
                <input type="checkbox" id="legendary-toggle">
                <span>橙武占比覆盖</span>
            </label>
        `;
        tabContainer.insertAdjacentElement("afterend", toggleContainer);
        const legendaryToggle = toggleContainer.querySelector("#legendary-toggle");

        function escapeHtml(value) {
            return String(value ?? "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#39;");
        }

        function formatTime(timestamp, includeWeekday = false) {
            if (!timestamp) {
                return "未知时间";
            }
            const date = new Date(timestamp * 1000);
            if (Number.isNaN(date.getTime())) {
                return "未知时间";
            }
            const options = {
                hour12: false,
                year: "numeric",
                month: "2-digit",
                day: "2-digit",
                hour: "2-digit",
                minute: "2-digit",
                second: "2-digit",
            };
            if (includeWeekday) {
                options.weekday = "short";
            }
            return date.toLocaleString("zh-CN", options);
        }

        function formatDuration(seconds) {
            const value = Number(seconds);
            if (!Number.isFinite(value) || value <= 0) {
                return "-";
            }
            const mins = Math.floor(value / 60);
            const secs = value % 60;
            return `${mins}分${String(secs).padStart(2, "0")}秒`;
        }

        function formatGrade(value) {
            if (value == null || value === "") {
                return "-";
            }
            return `${value}段`;
        }

        function setStatus(message, type) {
            const isError = type === "error";
            statusNode.textContent = message;
            statusNode.classList.toggle("error", isError);
            statusNode.classList.toggle("hidden", !isError);
        }

        function unwrapResponse(payload) {
            if (!payload || typeof payload !== "object") {
                throw new Error("响应格式异常");
            }
            if (Object.prototype.hasOwnProperty.call(payload, "status_code")) {
                if (payload.status_code !== 0) {
                    throw new Error(payload.status_msg || "接口返回错误");
                }
                return payload.data;
            }
            return payload;
        }

        function renderDateList(timestamps) {
            if (!Array.isArray(timestamps) || timestamps.length === 0) {
                listContainer.textContent = "暂无可用日期数据";
                return;
            }
            const items = timestamps
                .filter((value) => Number.isFinite(Number(value)))
                .sort((a, b) => Number(b) - Number(a))
                .map((value) => ({
                    value: String(value),
                    label: formatTime(Number(value), true),
                }));
            if (!items.length) {
                listContainer.textContent = "暂无可用日期数据";
                return;
            }

            dateSelect.innerHTML = items
                .map((item) => `<option value="${item.value}">${item.label}</option>`)
                .join("");
            dateSelect.disabled = false;

            const selected = items[0].value;
            dateSelect.value = selected;
        }

        function buildDetailsCacheKey(timestamp, rangeKey, lane, kungfu) {
            return [timestamp, rangeKey, lane, kungfu].join("::");
        }

        function buildDetailsUrl(timestamp, rangeKey, lane, kungfu) {
            const url = new URL(detailsApiBase, window.location.origin);
            url.searchParams.set("timestamp", timestamp);
            url.searchParams.set("range", rangeKey);
            url.searchParams.set("lane", lane);
            url.searchParams.set("kungfu", kungfu);
            return url.toString();
        }

        function buildRoleRecentUrl(server, name, identityHints = {}, cursor = 0, options = {}) {
            const url = new URL(roleRecentApiBase, window.location.origin);
            url.searchParams.set("server", server);
            url.searchParams.set("name", name);
            if (cursor > 0) {
                url.searchParams.set("cursor", String(cursor));
            }
            if (identityHints.game_role_id) {
                url.searchParams.set("game_role_id", identityHints.game_role_id);
            }
            if (identityHints.global_role_id) {
                url.searchParams.set("global_role_id", identityHints.global_role_id);
            }
            if (identityHints.role_id) {
                url.searchParams.set("role_id", identityHints.role_id);
            }
            if (identityHints.zone) {
                url.searchParams.set("zone", identityHints.zone);
            }
            if (options.forceRefresh) {
                url.searchParams.set("force_refresh", "true");
            }
            return url.toString();
        }

        function buildRoleIndicatorUrl(server, name, identityHints = {}, options = {}) {
            const url = new URL(roleIndicatorApiBase, window.location.origin);
            url.searchParams.set("server", server);
            url.searchParams.set("name", name);
            if (identityHints.game_role_id) {
                url.searchParams.set("game_role_id", identityHints.game_role_id);
            }
            if (identityHints.global_role_id) {
                url.searchParams.set("global_role_id", identityHints.global_role_id);
            }
            if (identityHints.role_id) {
                url.searchParams.set("role_id", identityHints.role_id);
            }
            if (identityHints.zone) {
                url.searchParams.set("zone", identityHints.zone);
            }
            if (options.forceRefresh) {
                url.searchParams.set("force_refresh", "true");
            }
            return url.toString();
        }

        function buildMatchDetailUrl(matchId) {
            const url = new URL(matchDetailApiBase, window.location.origin);
            url.searchParams.set("match_id", matchId);
            return url.toString();
        }

        function openModal(modal) {
            if (!(modal instanceof HTMLElement)) {
                return;
            }
            modal.classList.add("show");
            modal.setAttribute("aria-hidden", "false");
            document.body.style.overflow = "hidden";
        }

        function closeModal(modal) {
            if (!(modal instanceof HTMLElement)) {
                return;
            }
            modal.classList.remove("show");
            modal.setAttribute("aria-hidden", "true");
            if (!roleModal.classList.contains("show") && !matchModal.classList.contains("show") && !announcementModal.classList.contains("show")) {
                document.body.style.overflow = "";
            }
        }

        function renderDetailContent(members) {
            const filteredMembers = currentMode === "purple"
                ? (members || []).filter((member) => !isLegendaryWeapon(member))
                : (members || []);
            if (!filteredMembers.length) {
                return "<div class='muted'>暂无明细</div>";
            }

            return filteredMembers.map((member) => {
                const kungfuIcons = [];
                if (member.kungfu_id) {
                    const isLegendary = isLegendaryWeapon(member);
                    kungfuIcons.push(`<img class="detail-kungfu${isLegendary ? " is-legendary" : ""}" src="https://img.jx3box.com/image/xf/${member.kungfu_id}.png" alt="kungfu">`);
                }
                if (Array.isArray(member.teammates)) {
                    member.teammates.forEach((teammate) => {
                        if (teammate && teammate.kungfu_id) {
                            const isLegendary = isLegendaryWeapon(teammate);
                            const teammateName = teammate.role_name ?? "未知";
                            const tooltip = `${teammateName}`;
                            kungfuIcons.push(`<span class="detail-kungfu-wrap" data-tooltip="${escapeHtml(tooltip)}"><img class="detail-kungfu${isLegendary ? " is-legendary" : ""}" src="https://img.jx3box.com/image/xf/${teammate.kungfu_id}.png" alt="teammate"></span>`);
                        }
                    });
                }
                const kungfuRow = kungfuIcons.length
                    ? `<div class="detail-kungfu-row">${kungfuIcons.join("")}</div>`
                    : "";
                return `
                    <button
                        class="detail-item detail-item-btn"
                        type="button"
                        data-role-server="${escapeHtml(member.server ?? "")}"
                        data-role-name="${escapeHtml(member.name ?? "")}"
                        data-game-role-id="${escapeHtml(member.game_role_id ?? "")}"
                        data-global-role-id="${escapeHtml(member.global_role_id ?? "")}"
                        data-role-id="${escapeHtml(member.role_id ?? "")}"
                        data-zone="${escapeHtml(member.zone ?? "")}"
                    >
                        <div class="detail-rank">#${member.rank ?? "-"}</div>
                        <div class="detail-name">
                            ${member.weapon_icon ? `<img class="detail-weapon${isLegendaryWeapon(member) ? " is-legendary" : ""}" src="${escapeHtml(member.weapon_icon)}" alt="weapon">` : ""}
                            <div>
                                <div>${escapeHtml(member.name ?? "未知")}·${escapeHtml(member.server ?? "未知")}</div>
                                ${kungfuRow}
                            </div>
                        </div>
                        <div class="detail-score">${member.score ?? "-"}</div>
                    </button>
                `;
            }).join("");
        }

        async function ensureDetailLoaded(detailsNode) {
            if (!(detailsNode instanceof HTMLElement) || !detailsNode.open) {
                return;
            }
            const detailListNode = detailsNode.querySelector(".detail-list");
            if (!(detailListNode instanceof HTMLElement)) {
                return;
            }

            const rangeKey = detailsNode.dataset.range || "";
            const lane = detailsNode.dataset.lane || "";
            const kungfu = decodeURIComponent(detailsNode.dataset.kungfu || "");
            if (!currentStatsTimestamp || !rangeKey || !lane || !kungfu) {
                detailListNode.innerHTML = "<div class='muted'>缺少详情参数</div>";
                return;
            }

            const cacheKey = buildDetailsCacheKey(currentStatsTimestamp, rangeKey, lane, kungfu);
            if (detailCache.has(cacheKey)) {
                detailListNode.innerHTML = renderDetailContent(detailCache.get(cacheKey) || []);
                detailListNode.dataset.loaded = "true";
                return;
            }

            detailListNode.innerHTML = "<div class='muted'>正在加载明细...</div>";
            try {
                const response = await fetch(buildDetailsUrl(currentStatsTimestamp, rangeKey, lane, kungfu), { cache: "no-store" });
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                const payload = await response.json();
                const data = unwrapResponse(payload);
                const members = Array.isArray(data.members) ? data.members : [];
                detailCache.set(cacheKey, members);
                detailListNode.innerHTML = renderDetailContent(members);
                detailListNode.dataset.loaded = "true";
            } catch (error) {
                detailListNode.innerHTML = `<div class='muted error'>加载明细失败：${escapeHtml(error.message || error)}</div>`;
                detailListNode.dataset.loaded = "false";
            }
        }

        function renderList(rangeKey, laneName, list, validCount, legendaryCountMap) {
            const maxCount = list.reduce((maxValue, item) => Math.max(maxValue, item[1]), 1);
            return list.map(([kungfu, count]) => {
                const percent = validCount > 0 ? (count / validCount) * 100 : 0;
                const legendaryCount = Number((legendaryCountMap || {})[kungfu] || 0);
                const legendaryPercent = count > 0 ? (legendaryCount / count) * 100 : 0;
                const overlayPercent = showLegendaryOverlay ? legendaryPercent : 0;
                return `
                    <details class="detail" data-range="${rangeKey}" data-lane="${laneName}" data-kungfu="${encodeURIComponent(kungfu)}">
                        <summary>
                            <div class="bar-row">
                                <div class="bar-kungfu"><span class="arrow">›</span>${escapeHtml(kungfu)}</div>
                                <div class="bar">
                                    <div class="bar-fill" style="width:${(count / maxCount) * 100}%">
                                        <div class="bar-legendary" style="width:${overlayPercent}%"></div>
                                    </div>
                                </div>
                                <div class="bar-value">${count}</div>
                                <div class="bar-percent">${percent.toFixed(1)}%</div>
                            </div>
                        </summary>
                        <div class="detail-list" data-loaded="false">
                            <div class='muted'>展开后加载明细</div>
                        </div>
                    </details>
                `;
            }).join("");
        }

        function renderRangeCard(rangeKey, rangeLabel, stats, mode) {
            const healer = stats.healer || {};
            const dps = stats.dps || {};
            const minScore = healer.min_score ?? dps.min_score ?? "-";
            const healerList = healer.list || [];
            const dpsList = dps.list || [];
            const healerLegendaryCountMap = healer.legendary_count_map || {};
            const dpsLegendaryCountMap = dps.legendary_count_map || {};
            const titleSuffix = mode === "purple" ? "（紫武）" : "";
            const showMeta = ["前1000", "前200", "前100", "前50"].includes(rangeLabel);
            const seasonText = window.currentSeasonLabel || "-";

            return `
                <div class="range-card">
                    <div class="range-title">
                        <div class="range-heading">
                            <h3>${rangeLabel} 心法分布${titleSuffix}</h3>
                            <span>最低分数：${minScore}</span>
                        </div>
                        <button class="export-btn" type="button" data-range="${rangeLabel}" aria-label="分享统计图片">
                            <svg viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M14 3a1 1 0 0 0 0 2h3.59l-6.3 6.3a1 1 0 1 0 1.42 1.4L19 6.41V10a1 1 0 1 0 2 0V4a1 1 0 0 0-1-1h-6z"></path>
                                <path d="M5 7a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h9a2 2 0 0 0 2-2v-4a1 1 0 1 0-2 0v4H5V9h4a1 1 0 1 0 0-2H5z"></path>
                            </svg>
                        </button>
                    </div>
                    ${showMeta ? `<div class="range-meta">赛季：${escapeHtml(seasonText)}</div>` : ""}
                    <div class="lane">
                        <div class="lane-title">奶妈（${healer.valid_count ?? 0}）</div>
                        ${healerList.length ? renderList(rangeKey, "healer", healerList, healer.valid_count || 0, healerLegendaryCountMap) : "<div class='muted'>暂无奶妈数据</div>"}
                    </div>
                    <div class="lane">
                        <div class="lane-title">DPS（${dps.valid_count ?? 0}）</div>
                        ${dpsList.length ? renderList(rangeKey, "dps", dpsList, dps.valid_count || 0, dpsLegendaryCountMap) : "<div class='muted'>暂无DPS数据</div>"}
                    </div>
                </div>
            `;
        }

        function buildFilteredLane(lane, mode) {
            const sourceList = lane.list || [];
            const sourceLegendaryCountMap = lane.legendary_count_map || {};
            const listItems = [];
            let validCount = 0;
            const filteredLegendaryCountMap = {};

            sourceList.forEach(([kungfu, count]) => {
                const legendaryCount = Number(sourceLegendaryCountMap[kungfu] || 0);
                const filteredCount = mode === "purple"
                    ? Math.max(Number(count || 0) - legendaryCount, 0)
                    : Number(count || 0);
                if (filteredCount > 0) {
                    listItems.push([kungfu, filteredCount]);
                    filteredLegendaryCountMap[kungfu] = mode === "purple" ? 0 : legendaryCount;
                }
                validCount += filteredCount;
            });

            listItems.sort((a, b) => b[1] - a[1]);

            return {
                ...lane,
                valid_count: validCount,
                list: listItems,
                distribution: Object.fromEntries(listItems),
                min_score: lane.min_score,
                legendary_count_map: filteredLegendaryCountMap,
            };
        }

        function buildFilteredStats(stats, mode) {
            const result = {};
            Object.keys(stats || {}).forEach((rangeKey) => {
                const rangeStats = stats[rangeKey] || {};
                if (!rangeStats.healer || !rangeStats.dps) {
                    result[rangeKey] = rangeStats;
                    return;
                }
                result[rangeKey] = {
                    ...rangeStats,
                    healer: buildFilteredLane(rangeStats.healer, mode),
                    dps: buildFilteredLane(rangeStats.dps, mode),
                };
            });
            return result;
        }

        function renderStats(statsPayload, mode) {
            const stats = mode === "purple"
                ? buildFilteredStats(statsPayload.kungfu_statistics || {}, "purple")
                : (statsPayload.kungfu_statistics || {});

            grid.innerHTML = rangeConfigs
                .filter((config) => stats[config.key])
                .map((config) => renderRangeCard(config.key, config.label, stats[config.key], mode))
                .join("");
        }

        function render(data) {
            const seasonLabel = data.current_season ? `${data.current_season}${data.week_info || ""}` : (data.week_info || "-");
            window.currentSeasonLabel = seasonLabel || "-";
            window.currentRankingTimeLabel = formatTime(data.ranking_cache_time || data.generated_at);
            subtitle.innerHTML = `
                <span>赛季：${escapeHtml(seasonLabel || "-")}</span>
                <span>榜单时间：${formatTime(data.ranking_cache_time || data.generated_at)}</span>
            `;

            setMode(currentMode);

                grid.innerHTML = "<div class='range-card'>暂无统计数据</div>";

        function buildReadUrl(timestamp) {
            const hasQuery = readApiBase.includes("?");
            const joiner = hasQuery ? "&" : "?";
            return `${readApiBase}${joiner}timestamp=${encodeURIComponent(timestamp)}`;
        }

        async function loadStats(timestamp) {
            if (!timestamp) {
                setStatus("缺少 timestamp 参数，无法读取统计数据", "error");
                return;
            }
            currentStatsTimestamp = String(timestamp);
            setStatus(`请求接口：${buildReadUrl(timestamp)}`);
            try {
                const response = await fetch(buildReadUrl(timestamp), { cache: "no-store" });
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                const payload = await response.json();
                render(unwrapResponse(payload));
                setStatus("数据加载完成");
            } catch (error) {
                setStatus(`获取统计失败：${error.message || error}`, "error");
            }
        }

        async function loadDateList() {
            try {
                const response = await fetch(listApiUrl, { cache: "no-store" });
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                const payload = await response.json();
                renderDateList(unwrapResponse(payload));
                if (dateSelect && dateSelect.value) {
                    loadStats(dateSelect.value);
                }
            } catch (error) {
                listContainer.textContent = `获取日期列表失败：${error.message || error}`;
                listContainer.classList.add("error");
            }
        }

                    .filter(function (p) { return p && p.kungfu_id; })

        function renderRoleRecentModal(data, isAppend = false, indicatorData = null) {
            const matches = Array.isArray(data.recent_matches) ? data.recent_matches : [];

            const playerName = data.player?.name || "未知角色";
            const playerServer = data.player?.server || "未知服务器";

            roleModalTitle.textContent = `${playerName}·${playerServer}`;
            roleModalSubtitle.textContent = "";

            currentPagination = {
                hasMore: !!pagination.has_more,
                nextCursor: pagination.next_cursor ?? null,
                server: playerServer,
                name: playerName,
                identityHints: data.identity || {},

            };

            if (isAppend) {
                const panel = roleModalBody.querySelector(".match-list-panel");
                if (panel) {
                    const loadMoreWrap = panel.querySelector(".load-more-wrap");
                    const fragment = document.createElement("div");
                    fragment.innerHTML = matches.map((match) => renderRoleRecentMatchItem(match, playerName, playerServer)).join("");
                    if (loadMoreWrap) {
                        loadMoreWrap.insertAdjacentElement("beforebegin", fragment);

            let overviewHtml = "";

                overviewHtml = `<div class="role-overview-card" style="grid-column:1/-1"><strong class="muted">赛季战绩加载失败</strong><span>${escapeHtml(indicatorData.message || "indicator_unavailable")}</span></div>`;
            } else {
                overviewHtml = `<div class="role-overview-card" style="grid-column:1/-1"><strong class="muted">正在加载赛季战绩...</strong><span>等待战绩数据</span></div>`;
