        async function fetchRoleIndicator(server, name, identityHints, cacheKey, forceRefresh = false) {
            try {
                const response = await fetch(
                    buildRoleIndicatorUrl(server, name, identityHints, { forceRefresh }),
                    { cache: "no-store" },
                );
                if (response.ok) {
                    const payload = await response.json();
                    const data = unwrapResponse(payload);
                    roleIndicatorCache.set(cacheKey, { fetchedAt: Date.now(), data });
                    updateRoleOverviewIndicator(data);
                    return data;
                } else {
                    const data = { error: true, message: "indicator_unavailable" };
                    updateRoleOverviewIndicator(data);
                    return data;
                }
            } catch (e) {
                const data = { error: true, message: "indicator_unavailable" };
                updateRoleOverviewIndicator(data);
                return data;
            }
        }

        async function refreshRoleIndicator() {
            if (!currentRoleInspect || !currentRoleInspect.cacheKey) {
                return;
            }
            const button = document.getElementById("refresh-role-indicator-btn");
            if (button) {
                button.disabled = true;
                button.textContent = "刷新中...";
            }
            const previous = roleIndicatorCache.get(currentRoleInspect.cacheKey)?.data || null;
            const data = await fetchRoleIndicator(
                currentRoleInspect.server,
                currentRoleInspect.name,
                currentRoleInspect.identityHints || {},
                currentRoleInspect.cacheKey,
                true,
            );
            if (data && data.error && previous && !previous.error) {
                updateRoleOverviewIndicator(previous);
                const cacheLabel = document.getElementById("role-indicator-cache-label");
                if (cacheLabel) {
                    cacheLabel.textContent = `刷新失败，保留${renderIndicatorCacheLabel(previous) || "现有数据"}`;
                }
            }
            if (button) {
                button.disabled = false;
                button.textContent = "刷新战绩";
            }
        }

        async function fetchRoleRecent(server, name, identityHints, cacheKey, forceRefresh = false) {
            const response = await fetch(
                buildRoleRecentUrl(server, name, identityHints, 0, { forceRefresh }),
                { cache: "no-store" },
            );
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            const recentPayload = await response.json();
            const recentData = unwrapResponse(recentPayload);
            roleRecentCache.set(cacheKey, { fetchedAt: Date.now(), data: recentData });
            return recentData;
        }

        async function refreshRoleRecent() {
            if (!currentRoleInspect || !currentRoleInspect.cacheKey) {
                return;
            }
            const button = document.getElementById("refresh-role-recent-btn");
            if (button) {
                button.disabled = true;
                button.textContent = "刷新中...";
            }
            try {
                const recentData = await fetchRoleRecent(
                    currentRoleInspect.server,
                    currentRoleInspect.name,
                    currentRoleInspect.identityHints || {},
                    currentRoleInspect.cacheKey,
                    true,
                );
                const cachedIndicator = roleIndicatorCache.get(currentRoleInspect.cacheKey);
                const indicatorData = cachedIndicator ? cachedIndicator.data : null;
                renderRoleRecentModal(recentData, false, indicatorData);
            } catch (error) {
                const cacheLabel = document.getElementById("role-recent-cache-label");
                if (cacheLabel) {
                    cacheLabel.textContent = `对局刷新失败：${error.message || error}`;
                }
                if (button) {
                    button.disabled = false;
                    button.textContent = "点击重试";
                }
            }
        }

        async function loadRoleRecent(server, name, identityHints = {}) {
            const cacheKey = `${server}::${name}::${identityHints.global_role_id || ""}::${identityHints.game_role_id || ""}::${identityHints.zone || ""}`;
            openModal(roleModal);
            roleModalTitle.textContent = `${name}·${server}`;
            roleModalSubtitle.textContent = "";
            roleModalBody.innerHTML = "<div class='modal-loading'>正在加载角色近期战绩...</div>";

            const cached = roleRecentCache.get(cacheKey);
            if (cached && Date.now() - cached.fetchedAt < 600000) {
                currentRoleInspect = { server, name, identityHints, cacheKey };
                const cachedIndicator = roleIndicatorCache.get(cacheKey);
                const validIndicator = (cachedIndicator && Date.now() - cachedIndicator.fetchedAt < 86400000) ? cachedIndicator.data : null;
                renderRoleRecentModal(cached.data, false, validIndicator);
                if (!validIndicator) {
                    const indicatorRequest = fetchRoleIndicator(server, name, identityHints, cacheKey);
                    indicatorRequest.catch(function () {});
                }
                return;
            }

            try {
                const indicatorRequest = fetchRoleIndicator(server, name, identityHints, cacheKey);
                const [recentData, indicatorResponse] = await Promise.all([
                    fetchRoleRecent(server, name, identityHints, cacheKey),
                    indicatorRequest.catch(function () { return null; }),
                ]);

                var indicatorData = null;
                if (indicatorResponse) {
                    indicatorData = indicatorResponse;
                } else {
                    indicatorData = { error: true, message: "indicator_unavailable" };
                }

                currentRoleInspect = { server, name, identityHints, cacheKey };
                renderRoleRecentModal(recentData, false, indicatorData);
            } catch (error) {
                roleModalBody.innerHTML = `<div class='modal-loading error'>加载角色近期战绩失败：${escapeHtml(error.message || error)}</div>`;
            }
        }

        async function loadMoreMatches() {
            if (currentPagination.isLoading || !currentPagination.hasMore || currentPagination.nextCursor == null) {
                return;
            }
            currentPagination.isLoading = true;
            const loadMoreBtn = roleModalBody.querySelector("#load-more-btn");
            if (loadMoreBtn) {
                loadMoreBtn.textContent = "加载中...";
                loadMoreBtn.classList.add("loading");
                loadMoreBtn.disabled = true;
            }

            try {
                const url = buildRoleRecentUrl(
                    currentPagination.server,
                    currentPagination.name,
                    currentPagination.identityHints,
                    currentPagination.nextCursor,
                );
                const response = await fetch(url, { cache: "no-store" });
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                const payload = await response.json();
                const data = unwrapResponse(payload);
                renderRoleRecentModal(data, true);
            } catch (error) {
                if (loadMoreBtn) {
                    loadMoreBtn.textContent = "加载失败，点击重试";
                    loadMoreBtn.classList.remove("loading");
                    loadMoreBtn.disabled = false;
                }
                currentPagination.isLoading = false;
            }
        }

        async function loadMatchDetail(matchId, focusPlayer) {
            if (!matchId) {
                return;
            }
            openModal(matchModal);
            matchModalTitle.textContent = "对局详情";
            matchModalSubtitle.textContent = "";
            matchModalBody.innerHTML = "<div class='modal-loading'>正在加载对局详情...</div>";

            const cached = matchDetailCache.get(String(matchId));
            if (cached) {
                renderMatchDetailModal(cached, focusPlayer);
                return;
            }

            try {
                const response = await fetch(buildMatchDetailUrl(matchId), { cache: "no-store" });
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                const payload = await response.json();
                const data = unwrapResponse(payload);
                matchDetailCache.set(String(matchId), data);
                renderMatchDetailModal(data, focusPlayer);
            } catch (error) {
                matchModalBody.innerHTML = `<div class='modal-loading error'>加载对局详情失败：${escapeHtml(error.message || error)}</div>`;
            }
        }

        async function exportCardImage(card, label) {
            if (typeof window.html2canvas !== "function") {
                setStatus("图片生成库未加载，请稍后重试", "error");
                return;
            }
            const safeLabel = (label || "心法统计").replace(/\s+/g, "");
            const seasonLabel = (window.currentSeasonLabel || "").replace(/\s+/g, "") || "赛季";
            const modeSuffix = currentMode === "purple" ? "_紫武" : "";
            const fileName = `${safeLabel}_${seasonLabel}_心法分布${modeSuffix}.png`;
            const openDetails = Array.from(card.querySelectorAll("details[open]"));
            try {
                card.classList.add("is-exporting");
                openDetails.forEach((detail) => detail.removeAttribute("open"));
                const canvas = await window.html2canvas(card, {
                    backgroundColor: "#ffffff",
                    scale: 2,
                    useCORS: true,
                });
                const link = document.createElement("a");
                link.download = fileName;
                link.href = canvas.toDataURL("image/png");
                link.click();
            } catch (error) {
                setStatus(`生成图片失败：${error.message || error}`, "error");
            } finally {
                openDetails.forEach((detail) => detail.setAttribute("open", ""));
                card.classList.remove("is-exporting");
            }
        }

        function setMode(mode) {
            currentMode = mode;
            tabContainer.querySelectorAll(".tab-btn").forEach((btn) => {
                btn.classList.toggle("active", btn.dataset.mode === mode);
            });
            toggleContainer.classList.toggle("hidden", currentMode !== "all");
            if (currentStats) {
                renderStats(currentStats, mode);
            }
        }

        async function exportFullPageImage(modeOverride) {
            if (typeof window.html2canvas !== "function") {
                setStatus("图片生成库未加载，请稍后重试", "error");
                return;
            }
            if (!pageNode) {
                setStatus("页面节点不存在，无法导出", "error");
                return;
            }
            const previousMode = currentMode;
            const exportMode = modeOverride || currentMode;
            if (exportMode !== currentMode) {
                setMode(exportMode);
                await new Promise((resolve) => window.requestAnimationFrame(resolve));
            }
            const seasonLabel = (window.currentSeasonLabel || "").replace(/\s+/g, "") || "赛季";
            const rankingTimeLabel = (window.currentRankingTimeLabel || "").replace(/[^\dA-Za-z\u4e00-\u9fa5]+/g, "_") || "榜单";
            const modeSuffix = exportMode === "purple" ? "_紫武排名" : "_全部排名";
            const fileName = `竞技场心法排名统计_${seasonLabel}_${rankingTimeLabel}${modeSuffix}.png`;
            const openDetails = Array.from(pageNode.querySelectorAll("details[open]"));
            try {
                pageNode.classList.add("is-exporting-full");
                openDetails.forEach((detail) => detail.removeAttribute("open"));
                setStatus("正在生成整页图片，请稍候");
                const canvas = await window.html2canvas(pageNode, {
                    backgroundColor: "#f7fafd",
                    scale: 2,
                    useCORS: true,
                    scrollX: 0,
                    scrollY: -window.scrollY,
                    windowWidth: document.documentElement.scrollWidth,
                    windowHeight: document.documentElement.scrollHeight,
                });
                const link = document.createElement("a");
                link.download = fileName;
                link.href = canvas.toDataURL("image/png");
                link.click();
                setStatus("整页图片导出完成");
            } catch (error) {
                setStatus(`生成整页图片失败：${error.message || error}`, "error");
            } finally {
                openDetails.forEach((detail) => detail.setAttribute("open", ""));
                pageNode.classList.remove("is-exporting-full");
                if (previousMode !== exportMode) {
                    setMode(previousMode);
                }
            }
        }

        if (legendaryToggle) {
            legendaryToggle.addEventListener("change", (event) => {
                showLegendaryOverlay = event.target.checked;
                if (currentStats) {
                    renderStats(currentStats, currentMode);
                }
            });
        }

        // ---- Announcement Popup ----

        async function openAnnouncementFromCircle() {
            try {
                const resp = await fetch(ANNOUNCEMENT_API + "/latest-date", { cache: "no-store" });
                if (!resp.ok) return;
                const payload = await resp.json();
                const data = unwrapResponse(payload);
                const hero = data.announcement || null;
                const seenAt = hero ? String(hero.created_at || "") : null;
                showAnnouncementPopup(hero, seenAt);
            } catch (e) {
                // non-critical, silently ignore
            }
        }

        function renderAnnouncementPopup(heroAnnouncement, listItems) {
            var html = '';
            if (heroAnnouncement) {
                html += '<div class="announcement-hero">';
                html += '<div class="announcement-date">' + escapeHtml(heroAnnouncement.date || "") + '</div>';
                html += '<h3 class="announcement-title">' + escapeHtml(heroAnnouncement.title || "") + '</h3>';
                html += '<div class="announcement-body">' + escapeHtml(heroAnnouncement.content || "") + '</div>';
                html += '</div>';
            }

            if (listItems.length > 0) {
                html += '<div class="announcement-list-title">历史公告</div>';
                for (var i = 0; i < listItems.length; i++) {
                    var item = listItems[i];
                    html += '<div class="announcement-list-item">';
                    html += '<div class="item-header">';
                    html += '<span class="item-date">' + escapeHtml(item.date || "") + '</span>';
                    html += '<span class="item-title">' + escapeHtml(item.title || "") + '</span>';
                    html += '</div>';
                    html += '<div class="item-body">' + escapeHtml(item.content || "") + '</div>';
                    html += '</div>';
                }
            }

            if (announcementHasMore) {
                html += '<div id="announcement-sentinel" style="height:1px;"></div>';
                html += '<div id="announcement-loading" class="announcement-modal-loading" style="display:none;">加载中...</div>';
            }

            announcementBody.innerHTML = html;

            if (announcementHasMore) {
                var sentinel = document.getElementById("announcement-sentinel");
                if (sentinel) {
                    if (announcementObserver) announcementObserver.disconnect();
                    var modalCard = announcementModal.querySelector(".modal-card");
                    announcementObserver = new IntersectionObserver(function (entries) {
                        if (entries[0].isIntersecting && announcementHasMore && !announcementLoading) {
                            loadMoreAnnouncements();
                        }
                    }, { root: modalCard, rootMargin: "80px" });
                    announcementObserver.observe(sentinel);
                }
            }
        }

        function showAnnouncementPopup(heroAnnouncement, seenAt) {
            currentPopupSeenAt = seenAt;
            announcementCursor = null;
            announcementHasMore = true;
            announcementLoading = false;

            loadAnnouncementPage(heroAnnouncement);
            openModal(announcementModal);
        }

        async function loadAnnouncementPage(heroAnnouncement) {
            announcementBody.innerHTML = '<div class="modal-loading">加载公告...</div>';
            announcementLoading = true;
            try {
                var url = ANNOUNCEMENT_API + "/list?limit=5";
                if (announcementCursor !== null) url += "&cursor=" + announcementCursor;
                var resp = await fetch(url, { cache: "no-store" });
                if (!resp.ok) throw new Error("HTTP " + resp.status);
                var payload = await resp.json();
                var data = unwrapResponse(payload);
                var listItems = data.announcements || [];
                announcementCursor = data.next_cursor;
                announcementHasMore = data.has_more;
                renderAnnouncementPopup(heroAnnouncement, listItems);
            } catch (e) {
                announcementBody.innerHTML = '<div class="modal-loading error">加载公告失败</div>';
            } finally {
                announcementLoading = false;
            }
        }

        async function loadMoreAnnouncements() {
            announcementLoading = true;
            var loadingEl = document.getElementById("announcement-loading");
            if (loadingEl) loadingEl.style.display = "block";
            try {
                var url = ANNOUNCEMENT_API + "/list?limit=5";
                if (announcementCursor !== null) url += "&cursor=" + announcementCursor;
                var resp = await fetch(url, { cache: "no-store" });
                if (!resp.ok) throw new Error("HTTP " + resp.status);
                var payload = await resp.json();
                var data = unwrapResponse(payload);
                var items = data.announcements || [];
                announcementCursor = data.next_cursor;
                announcementHasMore = data.hasMore;

                var sentinel = document.getElementById("announcement-sentinel");
                var container = sentinel ? sentinel.parentNode : announcementBody;
                for (var i = 0; i < items.length; i++) {
                    var item = items[i];
                    var div = document.createElement("div");
                    div.className = "announcement-list-item";
                    div.innerHTML =
                        '<div class="item-header">' +
                        '<span class="item-date">' + escapeHtml(item.date || "") + '</span>' +
                        '<span class="item-title">' + escapeHtml(item.title || "") + '</span>' +
                        '</div>' +
                        '<div class="item-body">' + escapeHtml(item.content || "") + '</div>';
                    container.insertBefore(div, sentinel);
                }

                if (!announcementHasMore && sentinel) {
                    sentinel.remove();
                }
            } catch (e) {
                if (loadingEl) loadingEl.textContent = "加载失败";
            } finally {
                announcementLoading = false;
                if (loadingEl && announcementHasMore) loadingEl.style.display = "none";
            }
        }

        function dismissAnnouncement() {
            if (currentPopupSeenAt) safeSetAnnouncementSeen(currentPopupSeenAt);
            currentPopupSeenAt = null;
            if (announcementObserver) announcementObserver.disconnect();
            closeModal(announcementModal);
        }

        if (announcementDismissBtn) {
            announcementDismissBtn.addEventListener("click", dismissAnnouncement);
        }

        // ---- Floating Feedback Circle ----
        (function () {
            const circle = document.getElementById("floating-feedback");
            const closeBtn = document.getElementById("floating-feedback-close");
            if (!circle) return;

            const HIDDEN_KEY = "feedback_circle_hidden";

            if (!sessionStorage.getItem(HIDDEN_KEY)) {
                circle.classList.remove("hidden");
            }

            let dragState = null;

            function setPos(left, top) {
                circle.style.left = left + "px";
                circle.style.top = top + "px";
                circle.style.right = "auto";
                circle.style.bottom = "auto";
            }

            circle.addEventListener("pointerdown", function (e) {
                if (e.target === closeBtn) return;
                const rect = circle.getBoundingClientRect();
                dragState = {
                    startX: e.clientX,
                    startY: e.clientY,
                    startLeft: rect.left,
                    startTop: rect.top
                };
                circle.setPointerCapture(e.pointerId);
                circle.classList.add("dragging");
            });

            circle.addEventListener("pointermove", function (e) {
                if (!dragState) return;
                setPos(
                    dragState.startLeft + e.clientX - dragState.startX,
                    dragState.startTop + e.clientY - dragState.startY
                );
            });

            circle.addEventListener("pointerup", function (e) {
                if (!dragState) return;
                const dx = e.clientX - dragState.startX;
                const dy = e.clientY - dragState.startY;
                const wasDrag = Math.abs(dx) > 3 || Math.abs(dy) > 3;
                dragState = null;
                circle.classList.remove("dragging");
                if (!wasDrag) {
                    openAnnouncementFromCircle();
                }
            });

            circle.addEventListener("pointercancel", function () {
                dragState = null;
                circle.classList.remove("dragging");
            });

            closeBtn.addEventListener("click", function (e) {
                e.stopPropagation();
                circle.classList.add("hidden");
                try { sessionStorage.setItem(HIDDEN_KEY, "1"); } catch (ignored) {}
            });
        })();

        loadDateList();

        if (dateSelect) {
            dateSelect.addEventListener("change", (event) => {
                const value = event.target.value;
                if (value) {
                    loadStats(value);
                }
            });
        }

        if (grid) {
            grid.addEventListener("click", (event) => {
                const target = event.target;
                if (!(target instanceof HTMLElement)) {
                    return;
                }

                const exportButton = target.closest(".export-btn");
                if (exportButton) {
                    const card = exportButton.closest(".range-card");
                    if (card) {
                        exportCardImage(card, exportButton.getAttribute("data-range") || "心法统计");
                    }
                    return;
                }

                const memberButton = target.closest(".detail-item-btn");
                if (memberButton) {
                    const server = memberButton.getAttribute("data-role-server") || "";
                    const name = memberButton.getAttribute("data-role-name") || "";
                    if (server && name) {
                        loadRoleRecent(server, name, {
                            game_role_id: memberButton.getAttribute("data-game-role-id") || "",
                            global_role_id: memberButton.getAttribute("data-global-role-id") || "",
                            role_id: memberButton.getAttribute("data-role-id") || "",
                            zone: memberButton.getAttribute("data-zone") || "",
                        });
                    }
                    return;
                }

                const summary = target.closest("summary");
                if (summary) {
                    const detailsNode = summary.closest(".detail");
                    if (detailsNode instanceof HTMLElement) {
                        window.requestAnimationFrame(() => {
                            ensureDetailLoaded(detailsNode);
                        });
                    }
                }
            });
        }

        roleModal.addEventListener("click", (event) => {
            const target = event.target;
            if (!(target instanceof HTMLElement)) {
                return;
            }
            if (target === roleModal || target.closest("[data-close-modal='role']")) {
                closeModal(roleModal);
                return;
            }
            const loadMoreBtn = target.closest("#load-more-btn");
            if (loadMoreBtn) {
                loadMoreMatches();
                return;
            }
            const refreshIndicatorBtn = target.closest("#refresh-role-indicator-btn");
            if (refreshIndicatorBtn) {
                refreshRoleIndicator();
                return;
            }
            const refreshRecentBtn = target.closest("#refresh-role-recent-btn");
            if (refreshRecentBtn) {
                refreshRoleRecent();
                return;
            }
            const matchButton = target.closest(".match-row-btn");
            if (!matchButton) {
                return;
            }
            const matchId = matchButton.getAttribute("data-match-id") || "";
            if (!matchId) {
                return;
            }
            const focusPlayer = {
                name: matchButton.getAttribute("data-focus-name") || currentRoleInspect?.name || "",
                server: matchButton.getAttribute("data-focus-server") || currentRoleInspect?.server || "",
            };
            loadMatchDetail(matchId, focusPlayer);
        });

        matchModal.addEventListener("click", (event) => {
            const target = event.target;
            if (!(target instanceof HTMLElement)) {
                return;
            }
            if (target === matchModal || target.closest("[data-close-modal='match']")) {
                closeModal(matchModal);
            }
        });

        announcementModal.addEventListener("click", (event) => {
            const target = event.target;
            if (!(target instanceof HTMLElement)) {
                return;
            }
            if (target === announcementModal || target.closest("[data-close-modal='announcement']")) {
                dismissAnnouncement();
            }
        });

        document.addEventListener("keydown", (event) => {
            if (event.key !== "Escape") {
                return;
            }
            if (matchModal.classList.contains("show")) {
                closeModal(matchModal);
                return;
            }
            if (roleModal.classList.contains("show")) {
                closeModal(roleModal);
                return;
            }
            if (announcementModal.classList.contains("show")) {
                dismissAnnouncement();
            }
        });

        tabContainer.addEventListener("click", (event) => {
            const button = event.target.closest(".tab-btn");
            if (!button) {
                return;
            }
            setMode(button.dataset.mode || "all");
        });

        tabContainer.addEventListener("click", (event) => {
            const button = event.target.closest(".tab-export-btn");
            if (!button) {
                return;
            }
            exportFullPageImage(button.dataset.exportMode || currentMode);
        });
    </script>
</body>
</html>
