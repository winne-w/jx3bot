<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>竞技场心法排名统计</title>
    <style>
        :root {
            --bg: #f7fafd;
            --bg-accent: #e8f2ff;
            --ink: #2c3e50;
            --muted: #65748b;
            --card: #ffffff;
            --stroke: rgba(137, 196, 244, 0.22);
            --accent: #5b7cfa;
            --accent-2: #ff78b1;
            --shadow: 0 12px 32px rgba(94, 125, 245, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            color: var(--ink);
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            background:
                radial-gradient(circle at 15% 10%, rgba(137, 196, 244, 0.18), transparent 55%),
                radial-gradient(circle at 85% 0%, rgba(255, 121, 176, 0.18), transparent 60%),
                linear-gradient(140deg, var(--bg), #ffffff);
            min-height: 100vh;
            padding: 36px 24px 60px;
        }

        .page {
            max-width: 1180px;
            margin: 0 auto;
            position: relative;
        }

        .page::before {
            content: "";
            position: absolute;
            inset: -20px;
            background: repeating-linear-gradient(
                130deg,
                rgba(255, 255, 255, 0.55),
                rgba(255, 255, 255, 0.55) 1px,
                transparent 1px,
                transparent 18px
            );
            border-radius: 32px;
            z-index: -1;
        }

        header {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 24px 28px;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: var(--shadow);
            border: 1px solid rgba(137, 196, 244, 0.22);
        }

        .title {
            font-size: clamp(1.6rem, 2.6vw, 2.4rem);
            letter-spacing: 4px;
            font-weight: 700;
        }

        .subtitle {
            color: var(--muted);
            font-size: 0.98rem;
            display: flex;
            flex-wrap: wrap;
            gap: 10px 18px;
        }

        .announcement {
            border-radius: 14px;
            padding: 10px 14px;
            background: rgba(91, 124, 250, 0.08);
            border: 1px solid rgba(91, 124, 250, 0.22);
            color: #324a7d;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
        }

        .meta {
            display: grid;
            gap: 10px;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        }

        .meta-card {
            border-radius: 16px;
            padding: 12px 14px;
            background: var(--card);
            border: 1px solid var(--stroke);
            font-size: 0.92rem;
            color: var(--muted);
        }

        .meta-card strong {
            display: block;
            color: var(--ink);
            font-size: 1.04rem;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }

        .status {
            margin-top: 18px;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 0.95rem;
            background: rgba(255, 255, 255, 0.9);
            border: 1px dashed rgba(94, 125, 245, 0.25);
            color: var(--muted);
        }

        .status.hidden {
            display: none;
        }

        .tabs {
            margin-top: 18px;
            display: inline-flex;
            gap: 8px;
            padding: 6px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(137, 196, 244, 0.22);
            box-shadow: var(--shadow);
        }

        .tab-btn {
            border: none;
            padding: 6px 16px;
            border-radius: 999px;
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            color: var(--muted);
            background: transparent;
            transition: all 0.2s ease;
        }

        .tab-btn.active {
            color: #ffffff;
            background: linear-gradient(120deg, var(--accent), var(--accent-2));
            box-shadow: 0 8px 20px rgba(91, 124, 250, 0.25);
        }

        .toggle-wrap {
            margin-top: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(137, 196, 244, 0.22);
            box-shadow: var(--shadow);
            width: fit-content;
        }

        .toggle-wrap.hidden {
            display: none;
        }

        .toggle-wrap label {
            font-size: 0.88rem;
            color: var(--muted);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .toggle-wrap input[type="checkbox"] {
            width: 36px;
            height: 20px;
            appearance: none;
            background: rgba(91, 124, 250, 0.2);
            border-radius: 999px;
            position: relative;
            outline: none;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .toggle-wrap input[type="checkbox"]::after {
            content: "";
            position: absolute;
            top: 2px;
            left: 2px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #ffffff;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
            transition: transform 0.2s ease;
        }

        .toggle-wrap input[type="checkbox"]:checked {
            background: linear-gradient(120deg, var(--accent), var(--accent-2));
        }

        .toggle-wrap input[type="checkbox"]:checked::after {
            transform: translateX(16px);
        }

        .grid {
            margin-top: 28px;
            display: grid;
            gap: 24px;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        }

        .range-card {
            background: var(--card);
            border-radius: 20px;
            padding: 18px 18px 22px;
            border: 1px solid var(--stroke);
            box-shadow: 0 10px 28px rgba(94, 125, 245, 0.12);
        }

        .range-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            gap: 10px;
            flex-wrap: wrap;
        }

        .range-heading {
            display: flex;
            flex-wrap: nowrap;
            align-items: baseline;
            gap: 10px;
            white-space: nowrap;
        }

        .range-title h3 {
            margin: 0;
            font-size: 1.1rem;
            letter-spacing: 2px;
        }

        .range-title span {
            color: var(--muted);
            font-size: 0.85rem;
        }

        .range-meta {
            margin: 6px 0 4px;
            font-size: 0.86rem;
            color: var(--muted);
        }

        .export-btn {
            border: none;
            border-radius: 999px;
            padding: 4px 10px;
            font-size: 0.78rem;
            font-weight: 600;
            cursor: pointer;
            color: var(--accent);
            background: rgba(91, 124, 250, 0.12);
            box-shadow: none;
            transition: transform 0.2s ease, background 0.2s ease;
            margin-left: auto;
        }

        .export-btn svg {
            width: 14px;
            height: 14px;
            display: block;
            fill: currentColor;
        }

        .export-btn:hover {
            transform: translateY(-1px);
            background: rgba(91, 124, 250, 0.18);
        }

        .range-card.is-exporting .export-btn {
            opacity: 0;
            pointer-events: none;
        }

        .range-card.is-exporting .detail-list {
            display: none;
        }

        .export-meta {
            font-size: 0.86rem;
            color: var(--muted);
            margin-bottom: 6px;
        }

        .lane {
            margin-top: 12px;
        }

        .lane-title {
            font-size: 0.98rem;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 8px;
        }

        .bar-row {
            display: grid;
            grid-template-columns: 96px 1fr 52px 60px;
            align-items: center;
            gap: 10px;
            margin-bottom: 4px;
            font-size: 0.9rem;
        }

        .bar {
            height: 16px;
            border-radius: 999px;
            background: linear-gradient(90deg, rgba(91, 124, 250, 0.14), rgba(255, 120, 177, 0.18));
            position: relative;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, var(--accent), var(--accent-2));
            transition: width 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .bar-value {
            font-weight: 700;
            color: var(--ink);
            text-align: right;
        }

        .bar-percent {
            color: var(--muted);
            text-align: right;
            font-size: 0.84rem;
        }

        .bar-legendary {
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: linear-gradient(90deg, rgba(245, 197, 66, 0.9), rgba(245, 168, 66, 0.9));
            opacity: 0.85;
        }

        .bar-kungfu {
            font-weight: 700;
            letter-spacing: 0.5px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .arrow {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
            border-radius: 999px;
            font-size: 0.75rem;
            color: var(--accent);
            background: rgba(91, 124, 250, 0.12);
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .detail[open] .arrow {
            transform: rotate(90deg);
            background: rgba(255, 120, 177, 0.15);
        }

        .detail {
            padding: 0;
            margin-bottom: 6px;
            transition: color 0.2s ease;
        }

        .detail summary {
            list-style: none;
            cursor: pointer;
        }

        .detail:hover {
            color: var(--ink);
        }

        .detail summary::-webkit-details-marker {
            display: none;
        }

        .detail-list {
            margin-top: 8px;
            padding-top: 4px;
            border-top: 1px solid rgba(137, 196, 244, 0.25);
            display: grid;
            gap: 4px;
            font-size: 0.88rem;
        }

        .detail-item {
            display: grid;
            grid-template-columns: 72px 1fr 70px;
            gap: 8px;
            align-items: center;
            color: var(--muted);
        }

        .detail-name {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .detail-weapon {
            width: 18px;
            height: 18px;
            border-radius: 4px;
            object-fit: cover;
            flex: 0 0 auto;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.12);
        }

        .detail-weapon.is-legendary {
            border: 2px solid #f5c542;
            box-shadow: 0 2px 8px rgba(245, 197, 66, 0.45);
        }

        .detail-kungfu-row {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 4px;
        }

        .detail-kungfu-wrap {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .detail-kungfu-wrap::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translate(-50%, -4px);
            background: rgba(30, 40, 55, 0.92);
            color: #ffffff;
            font-size: 0.78rem;
            padding: 4px 8px;
            border-radius: 8px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s ease, transform 0.15s ease;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.2);
            z-index: 10;
        }

        .detail-kungfu-wrap[data-tooltip=""]::after {
            display: none;
        }

        .detail-kungfu-wrap:hover::after {
            opacity: 1;
            transform: translate(-50%, -10px);
        }

        .detail-kungfu {
            width: 18px;
            height: 18px;
            border-radius: 4px;
            object-fit: cover;
            background: #fff;
            border: 1px solid rgba(0, 0, 0, 0.08);
        }

        .detail-kungfu.is-legendary {
            border: 2px solid #f5c542;
            box-shadow: 0 2px 8px rgba(245, 197, 66, 0.45);
        }

        .detail-rank {
            font-weight: 700;
            color: var(--ink);
        }

        .detail-score {
            text-align: right;
            color: var(--ink);
        }

        .muted {
            color: var(--muted);
        }

        .error {
            color: #8a2d2d;
        }

        @media (max-width: 700px) {
            body {
                padding: 20px 14px 40px;
            }

            header {
                padding: 18px;
            }

            .bar-row {
                grid-template-columns: 88px 1fr 48px 56px;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>
<body>
    <div class="page">
        <header>
            <div class="title">竞技场心法排名统计</div>
            <div class="announcement">现在点击心法名称可展开查看角色分数；右侧分享按钮可生成该统计卡片图片。</div>
            <div class="subtitle" id="subtitle">
                <span class="muted">正在加载实时数据...</span>
            </div>
            <div class="status" id="status">正在请求统计接口</div>
        </header>

        <section class="grid" id="grid"></section>
    </div>

    <script>
        const BASE_API = "/jx3bot/api/jjc/ranking-stats";
        const DEFAULT_LIST_API = `${BASE_API}?action=list`;
        const DEFAULT_READ_API = `${BASE_API}?action=read`;
        const params = new URLSearchParams(window.location.search);
        const listApiUrl = params.get("list_api") || DEFAULT_LIST_API;
        const readApiBase = params.get("api") || DEFAULT_READ_API;
        const initialTimestamp = params.get("timestamp");

        const rangeConfigs = [
            { key: "top_1000", label: "前1000" },
            { key: "top_200", label: "前200" },
            { key: "top_100", label: "前100" },
            { key: "top_50", label: "前50" },
        ];

        const subtitle = document.getElementById("subtitle");
        const grid = document.getElementById("grid");
        const statusNode = document.getElementById("status");
        let currentStats = null;
        let currentMode = "all";
        let showLegendaryOverlay = true;

        const listContainer = document.createElement("div");
        listContainer.className = "status";
        listContainer.id = "list-status";
        listContainer.innerHTML = `
            <label class="muted" for="date-select">可用日期：</label>
            <select id="date-select" disabled></select>
        `;
        statusNode.insertAdjacentElement("afterend", listContainer);
        const dateSelect = listContainer.querySelector("#date-select");

        const tabContainer = document.createElement("div");
        tabContainer.className = "tabs";
        tabContainer.innerHTML = `
            <button class="tab-btn active" data-mode="all" type="button">全部排名</button>
            <button class="tab-btn" data-mode="purple" type="button">紫武排名</button>
        `;
        listContainer.insertAdjacentElement("afterend", tabContainer);

        const toggleContainer = document.createElement("div");
        toggleContainer.className = "toggle-wrap";
        toggleContainer.innerHTML = `
            <label>
                <input type="checkbox" id="legendary-toggle" checked>
                <span>橙武占比覆盖</span>
            </label>
        `;
        tabContainer.insertAdjacentElement("afterend", toggleContainer);
        const legendaryToggle = toggleContainer.querySelector("#legendary-toggle");

        tabContainer.addEventListener("click", (event) => {
            const button = event.target.closest(".tab-btn");
            if (!button) return;
            const mode = button.dataset.mode || "all";
            currentMode = mode;
            tabContainer.querySelectorAll(".tab-btn").forEach((btn) => {
                btn.classList.toggle("active", btn === button);
            });
            toggleContainer.classList.toggle("hidden", currentMode !== "all");
            if (currentStats) {
                renderStats(currentStats, mode);
            }
        });

        if (legendaryToggle) {
            legendaryToggle.addEventListener("change", (event) => {
                showLegendaryOverlay = event.target.checked;
                if (currentStats) {
                    renderStats(currentStats, currentMode);
                }
            });
        }

        function formatTime(timestamp, includeWeekday = false) {
            if (!timestamp) {
                return "未知时间";
            }
            const date = new Date(timestamp * 1000);
            if (Number.isNaN(date.getTime())) {
                return "未知时间";
            }
            const options = {
                hour12: false,
                year: "numeric",
                month: "2-digit",
                day: "2-digit",
                hour: "2-digit",
                minute: "2-digit",
                second: "2-digit",
            };
            if (includeWeekday) {
                options.weekday = "short";
            }
            return date.toLocaleString("zh-CN", options);
        }

        function setStatus(message, type) {
            const isError = type === "error";
            statusNode.textContent = message;
            statusNode.classList.toggle("error", isError);
            statusNode.classList.toggle("hidden", !isError);
        }

        function renderDateList(timestamps) {
            if (!Array.isArray(timestamps) || timestamps.length === 0) {
                listContainer.textContent = "暂无可用日期数据";
                return;
            }
            const items = timestamps
                .filter((value) => Number.isFinite(Number(value)))
                .sort((a, b) => Number(b) - Number(a))
                .map((value) => ({
                    value: String(value),
                    label: formatTime(Number(value), true),
                }));
            if (!items.length) {
                listContainer.textContent = "暂无可用日期数据";
                return;
            }

            dateSelect.innerHTML = items
                .map((item) => `<option value="${item.value}">${item.label}</option>`)
                .join("");
            dateSelect.disabled = false;

            const selected = initialTimestamp && items.some((item) => item.value === String(initialTimestamp))
                ? String(initialTimestamp)
                : items[0].value;
            dateSelect.value = selected;
        }

        function renderList(list, validCount, membersMap) {
            const maxCount = list.reduce((maxValue, item) => Math.max(maxValue, item[1]), 1);
            return list.map(([kungfu, count]) => {
                const percent = validCount > 0 ? (count / validCount) * 100 : 0;
                const members = (membersMap && membersMap[kungfu]) || [];
                const legendaryCount = members.filter((member) => String(member.weapon_quality) === "5").length;
                const legendaryPercent = members.length ? (legendaryCount / members.length) * 100 : 0;
                const overlayPercent = showLegendaryOverlay ? legendaryPercent : 0;
                const detailContent = members.length
                    ? members.map((member) => {
                        const kungfuIcons = [];
                        if (member.kungfu_id) {
                            const isLegendary = String(member.weapon_quality) === "5";
                            kungfuIcons.push(`<img class="detail-kungfu${isLegendary ? " is-legendary" : ""}" src="https://img.jx3box.com/image/xf/${member.kungfu_id}.png" alt="kungfu">`);
                        }
                        if (Array.isArray(member.teammates)) {
                            member.teammates.forEach((teammate) => {
                                if (teammate && teammate.kungfu_id) {
                                    const isLegendary = String(teammate.weapon_quality) === "5";
                                    const teammateName = teammate.role_name ?? "未知";
                                    const tooltip = `${teammateName}`;
                                    kungfuIcons.push(`<span class="detail-kungfu-wrap" data-tooltip="${tooltip}"><img class="detail-kungfu${isLegendary ? " is-legendary" : ""}" src="https://img.jx3box.com/image/xf/${teammate.kungfu_id}.png" alt="teammate"></span>`);
                                }
                            });
                        }
                        const kungfuRow = kungfuIcons.length
                            ? `<div class="detail-kungfu-row">${kungfuIcons.join("")}</div>`
                            : "";
                        return `
                        <div class="detail-item">
                            <div class="detail-rank">#${member.rank ?? "-"}</div>
                            <div class="detail-name">
                                ${member.weapon_icon ? `<img class="detail-weapon${String(member.weapon_quality) === "5" ? " is-legendary" : ""}" src="${member.weapon_icon}" alt="weapon">` : ""}
                                <div>
                                    <div>${member.name ?? "未知"}·${member.server ?? "未知"}</div>
                                    ${kungfuRow}
                                </div>
                            </div>
                            <div class="detail-score">${member.score ?? "-"}</div>
                        </div>
                    `;
                    }).join("")
                    : "<div class='muted'>暂无明细</div>";
                return `
                    <details class="detail">
                        <summary>
                            <div class="bar-row">
                            <div class="bar-kungfu"><span class="arrow">›</span>${kungfu}</div>
                            <div class="bar">
                                <div class="bar-fill" style="width:${(count / maxCount) * 100}%">
                                    <div class="bar-legendary" style="width:${overlayPercent}%"></div>
                                </div>
                            </div>
                            <div class="bar-value">${count}</div>
                            <div class="bar-percent">${percent.toFixed(1)}%</div>
                        </div>
                    </summary>
                    <div class="detail-list">
                        ${detailContent}
                        </div>
                    </details>
                `;
            }).join("");
        }

        function renderRangeCard(rangeLabel, stats, mode) {
            const healer = stats.healer || {};
            const dps = stats.dps || {};
            const minScore = healer.min_score ?? dps.min_score ?? "-";
            const healerList = healer.list || [];
            const dpsList = dps.list || [];
            const healerMembers = healer.members || {};
            const dpsMembers = dps.members || {};
            const titleSuffix = mode === "purple" ? "（紫武）" : "";
            const showMeta = ["前1000", "前200", "前100", "前50"].includes(rangeLabel);
            const seasonText = window.currentSeasonLabel || "-";

            return `
                <div class="range-card">
                    <div class="range-title">
                        <div class="range-heading">
                            <h3>${rangeLabel} 心法分布${titleSuffix}</h3>
                            <span>最低分数：${minScore}</span>
                        </div>
                        <button class="export-btn" type="button" data-range="${rangeLabel}" aria-label="分享统计图片">
                            <svg viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M14 3a1 1 0 0 0 0 2h3.59l-6.3 6.3a1 1 0 1 0 1.42 1.4L19 6.41V10a1 1 0 1 0 2 0V4a1 1 0 0 0-1-1h-6z"></path>
                                <path d="M5 7a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h9a2 2 0 0 0 2-2v-4a1 1 0 1 0-2 0v4H5V9h4a1 1 0 1 0 0-2H5z"></path>
                            </svg>
                        </button>
                    </div>
                    ${showMeta ? `<div class="range-meta">赛季：${seasonText}</div>` : ""}
                    <div class="lane">
                        <div class="lane-title">奶妈（${healer.valid_count ?? 0}）</div>
                        ${healerList.length ? renderList(healerList, healer.valid_count || 0, healerMembers) : "<div class='muted'>暂无奶妈数据</div>"}
                    </div>
                    <div class="lane">
                        <div class="lane-title">DPS（${dps.valid_count ?? 0}）</div>
                        ${dpsList.length ? renderList(dpsList, dps.valid_count || 0, dpsMembers) : "<div class='muted'>暂无DPS数据</div>"}
                    </div>
                </div>
            `;
        }

        function buildFilteredLane(lane, mode) {
            const membersMap = lane.members || {};
            const filteredMembersMap = {};
            const listItems = [];
            let validCount = 0;

            Object.keys(membersMap).forEach((kungfu) => {
                const members = membersMap[kungfu] || [];
                const filtered = mode === "purple"
                    ? members.filter((member) => String(member.weapon_quality) !== "5")
                    : members.slice();
                if (filtered.length > 0) {
                    filteredMembersMap[kungfu] = filtered;
                }
                validCount += filtered.length;
                listItems.push([kungfu, filtered.length]);
            });

            listItems.sort((a, b) => b[1] - a[1]);

            return {
                valid_count: validCount,
                list: listItems,
                min_score: lane.min_score,
                members: filteredMembersMap,
            };
        }

        function buildFilteredStats(stats, mode) {
            const result = {};
            Object.keys(stats || {}).forEach((rangeKey) => {
                const rangeStats = stats[rangeKey] || {};
                if (!rangeStats.healer || !rangeStats.dps) {
                    result[rangeKey] = rangeStats;
                    return;
                }
                result[rangeKey] = {
                    ...rangeStats,
                    healer: buildFilteredLane(rangeStats.healer, mode),
                    dps: buildFilteredLane(rangeStats.dps, mode),
                };
            });
            return result;
        }

        function renderStats(statsPayload, mode) {
            const stats = mode === "purple"
                ? buildFilteredStats(statsPayload.kungfu_statistics || {}, "purple")
                : (statsPayload.kungfu_statistics || {});

            grid.innerHTML = rangeConfigs
                .filter((config) => stats[config.key])
                .map((config) => renderRangeCard(config.label, stats[config.key], mode))
                .join("");
        }

        function render(data) {
            const seasonLabel = data.current_season ? `${data.current_season}${data.week_info || ""}` : (data.week_info || "-");
            window.currentSeasonLabel = seasonLabel || "-";
            window.currentRankingTimeLabel = formatTime(data.ranking_cache_time || data.generated_at);
            subtitle.innerHTML = `
                <span>赛季：${seasonLabel || "-"}</span>
                <span>榜单时间：${formatTime(data.ranking_cache_time || data.generated_at)}</span>
            `;

            currentStats = data;
            renderStats(data, "all");

            if (!grid.innerHTML) {
                grid.innerHTML = "<div class='range-card'>暂无统计数据</div>";
            }
        }

        function buildReadUrl(timestamp) {
            const hasQuery = readApiBase.includes("?");
            const joiner = hasQuery ? "&" : "?";
            return `${readApiBase}${joiner}timestamp=${encodeURIComponent(timestamp)}`;
        }

        function updateUrlTimestamp(timestamp) {
            if (!timestamp) {
                return;
            }
            const url = new URL(window.location.href);
            url.searchParams.set("timestamp", String(timestamp));
            window.history.replaceState({}, "", url.toString());
        }

        function unwrapResponse(payload) {
            if (!payload || typeof payload !== "object") {
                throw new Error("响应格式异常");
            }
            if (Object.prototype.hasOwnProperty.call(payload, "status_code")) {
                if (payload.status_code !== 0) {
                    throw new Error(payload.status_msg || "接口返回错误");
                }
                return payload.data;
            }
            return payload;
        }

        async function loadStats(timestamp) {
            if (!timestamp) {
                setStatus("缺少 timestamp 参数，无法读取统计数据", "error");
                return;
            }
            updateUrlTimestamp(timestamp);
            const apiUrl = buildReadUrl(timestamp);
            setStatus(`请求接口：${apiUrl}`);
            try {
                const response = await fetch(apiUrl, { cache: "no-store" });
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                const payload = await response.json();
                const data = unwrapResponse(payload);
                render(data);
                setStatus("数据加载完成");
            } catch (error) {
                setStatus(`获取统计失败：${error.message || error}`, "error");
            }
        }

        async function loadDateList() {
            try {
                const response = await fetch(listApiUrl, { cache: "no-store" });
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                const payload = await response.json();
                const data = unwrapResponse(payload);
                renderDateList(data);
                if (dateSelect && dateSelect.value) {
                    loadStats(dateSelect.value);
                }
            } catch (error) {
                listContainer.textContent = `获取日期列表失败：${error.message || error}`;
                listContainer.classList.add("error");
            }
        }

        loadDateList();
        if (initialTimestamp) {
            loadStats(initialTimestamp);
        }

        if (dateSelect) {
            dateSelect.addEventListener("change", (event) => {
                const value = event.target.value;
                if (value) {
                    loadStats(value);
                }
            });
        }

        async function exportCardImage(card, label) {
            if (typeof window.html2canvas !== "function") {
                setStatus("图片生成库未加载，请稍后重试", "error");
                return;
            }
            const safeLabel = (label || "心法统计").replace(/\s+/g, "");
            const seasonLabel = (window.currentSeasonLabel || "").replace(/\s+/g, "") || "赛季";
            const modeSuffix = currentMode === "purple" ? "_紫武" : "";
            const fileName = `${safeLabel}_${seasonLabel}_心法分布${modeSuffix}.png`;
            const openDetails = Array.from(card.querySelectorAll("details[open]"));
            try {
                card.classList.add("is-exporting");
                openDetails.forEach((detail) => detail.removeAttribute("open"));
                const canvas = await window.html2canvas(card, {
                    backgroundColor: "#ffffff",
                    scale: 2,
                    useCORS: true,
                });
                const link = document.createElement("a");
                link.download = fileName;
                link.href = canvas.toDataURL("image/png");
                link.click();
            } catch (error) {
                setStatus(`生成图片失败：${error.message || error}`, "error");
            } finally {
                openDetails.forEach((detail) => detail.setAttribute("open", ""));
                card.classList.remove("is-exporting");
            }
        }

        if (grid) {
            grid.addEventListener("click", (event) => {
                const target = event.target;
                if (!(target instanceof HTMLElement)) {
                    return;
                }
                const button = target.closest(".export-btn");
                if (!button) {
                    return;
                }
                const card = button.closest(".range-card");
                if (!card) {
                    return;
                }
                exportCardImage(card, button.getAttribute("data-range") || "心法统计");
            });
        }
    </script>
</body>
</html>
